apiVersion: apps/v1
kind: Deployment
metadata:
  name: origem-pay-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: origem-pay
  template:
    metadata:
      labels:
        app: origem-pay
    spec:
      containers:
      - name: origem-pay
        image: origemglobaltecnologia/origem-pay:latest
        ports:
        - containerPort: 80
        env:
        - name: API_URL
          value: "http://192.168.49.2:30082"
---
apiVersion: v1
kind: Service
metadata:
  name: origem-pay-service
spec:
  type: NodePort
  selector:
    app: origem-pay
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
